syntax = "proto3";

package appointment;

service AppointmentService {
  // 1. Bác sĩ lấy danh sách bệnh nhân đặt lịch theo ngày
  rpc GetListPatientForDoctor (GetListPatientRequest) returns (ListPatientResponse);

  // 2. Bác sĩ xác nhận lịch khám (Gửi kèm ảnh hóa đơn/kết quả nếu cần)
  rpc VerifyBooking (VerifyBookingRequest) returns (VerifyResponse);
  
  // 3. Bác sĩ hoàn tất khám (Ghi bệnh án + Kê đơn) - Sẽ làm ở bước sau
  rpc FinishAppointment (FinishAppointmentRequest) returns (FinishResponse);

  rpc GetMedicalHistory (GetMedicalHistoryRequest) returns (MedicalHistoryResponse);
}

// --- Request cho việc lấy lịch sử ---
message GetMedicalHistoryRequest {
  int32 patient_id = 1; // Nếu truyền > 0: Lấy lịch sử của 1 bệnh nhân cụ thể
  int32 doctor_id = 2;  // Nếu truyền > 0: Lấy lịch sử các ca bác sĩ đó đã khám
  string keyword = 3;   // Tìm kiếm theo chẩn đoán hoặc tên bệnh nhân
}

// --- Cấu trúc một bản ghi bệnh án hoàn chỉnh để hiển thị ---
message MedicalRecordItem {
  int32 record_id = 1;
  int32 booking_id = 2;
  int32 patient_id = 3;
  string patient_name = 4;
  string doctor_name = 5;
  string date = 6;            // Ngày khám (YYYY-MM-DD)
  string symptoms = 7;        // Triệu chứng
  string diagnosis = 8;       // Chẩn đoán
  string treatment_plan = 9;  // Lời dặn/Kế hoạch điều trị
  repeated MedicineItem medicines = 10; // Danh sách thuốc đã kê
  repeated TreatmentItem treatments = 11; // Các liệu trình đã làm
  string re_exam_date = 12;   // Ngày hẹn tái khám
}

message MedicalHistoryResponse {
  bool success = 1;
  string message = 2;
  repeated MedicalRecordItem data = 3;
}

message GetListPatientRequest {
  int32 doctor_id = 1;
  string date = 2; // YYYY-MM-DD (Timestamp dạng string)
}

message PatientBookingItem {
  int32 booking_id = 1;
  int32 patient_id = 2;
  string patient_name = 3;
  string phone_number = 4;
  string time_type = 5;
  string time_display = 6;
  string reason = 7;
  string status = 8; // pending, confirmed...
  string gender = 9;
  string birthday = 10;
  string address = 11;
}

message ListPatientResponse {
  bool success = 1;
  string message = 2;
  repeated PatientBookingItem data = 3;
}

message VerifyBookingRequest {
  int32 doctor_id = 1;
  int32 booking_id = 2;
  string status = 3;
}

message VerifyResponse {
  bool success = 1;
  string message = 2;
}

message MedicineItem {
  int32 drug_id = 1;
  string drug_name = 2;
  int32 quantity = 3;
  string instruction = 4;
}

message FinishAppointmentRequest {
  int32 doctor_id = 1;
  int32 booking_id = 2;
  string reason = 3;     
  string symptoms = 4;        
  string diagnosis = 5;       
  string treatment_plan = 6;  
  repeated MedicineItem medicines = 7;
  repeated TreatmentItem treatments = 8;
  string re_exam_date = 9;
}

message TreatmentItem {
  string name = 1;        // Tên liệu trình (VD: Châm cứu)
  string times = 2;       // Số lần (VD: 2 lần/ngày)
  string instruction = 3; // Hướng dẫn (VD: Sau ăn)
  string repeat_days = 4; // Nhắc lại (VD: Sau 1 tuần)
}

message FinishResponse {
  bool success = 1;
  string message = 2;
  int32 record_id = 3;
}