syntax = "proto3";

package auth;

service AuthService {
  // 1. Đăng ký (POST /api/auth/register)
  rpc Register (RegisterRequest) returns (AuthResponse);

  // 2. Đăng nhập (POST /api/auth/login)
  rpc Login (LoginRequest) returns (AuthResponse);

  // 3. Gia hạn token (POST /api/auth/refresh-token)
  rpc RefreshToken (RefreshTokenRequest) returns (AuthResponse);

  // 4. Đăng xuất (POST /api/auth/logout)
  rpc Logout (Empty) returns (StatusResponse);

  // 5. Quên mật khẩu
  rpc ForgotPassword(ForgotPasswordRequest) returns (ForgotPasswordResponse);

  // 6. Đặt lại mật khẩu
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);

  // 7. Xác nhận OTP
  rpc VerifyOTP (VerifyOTPRequest) returns (StatusResponse);
}

// --- Messages ---
message Empty {}

message StatusResponse {
  bool success = 1;
  string message = 2;
}

message VerifyOTPRequest {
  string email = 1;
  string otp = 2;
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string fullName = 3;
  string phone = 4;
  string role = 5;
  string birthday = 6; // <--- THÊM DÒNG NÀY ĐỂ ĐĂNG KÝ CÓ NGÀY SINH
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RefreshTokenRequest {
  string refreshToken = 1;
}

message ForgotPasswordRequest {
  string email = 1;
}

message ForgotPasswordResponse {
  bool success = 1;
  string message = 2; 
}

message ResetPasswordRequest {
  string email = 1;
  string otp = 2;
  string new_password = 3;
}

message ResetPasswordResponse {
  bool success = 1;
  string message = 2;
}

// User Info trả về kèm Token sau khi Login/Register
message UserInfo {
  int32 id = 1;
  string email = 2;
  string role = 3;
  string fullName = 4;
  string avatar = 5;
  string phone = 6;
  string birthday = 7; // <--- THÊM DÒNG NÀY ĐỂ TRẢ VỀ NGÀY SINH
}

message AuthResponse {
  string accessToken = 1;
  string refreshToken = 2;
  UserInfo user = 3;
}