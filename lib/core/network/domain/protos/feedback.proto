syntax = "proto3";

package feedback;

service FeedbackService {
  rpc SendFeedback (FeedbackRequest) returns (FeedbackResponse);
  rpc GetDoctorFeedbacks (DoctorIdRequest) returns (FeedbackListResponse);
  rpc GetClinicFeedbacks (ClinicIdRequest) returns (FeedbackListResponse);
  rpc GetServiceFeedbacks (ServiceIdRequest) returns (FeedbackListResponse);
  rpc GetAllFeedbacks (Empty) returns (FeedbackListResponse);
}

message Empty {}

message FeedbackRequest {
  int32 booking_id = 1;
  int32 patient_id = 2;
  int32 doctor_id = 3;
  int32 clinic_id = 4;
  int32 service_id = 5;
  int32 rating_doctor = 6;
  int32 rating_clinic = 7;
  int32 rating_service = 8;
  int32 rating_booking = 9;
  string comment = 10;
}

message FeedbackResponse {
  bool success = 1;
  string message = 2;
}

message DoctorIdRequest { int32 doctor_id = 1; }
message ClinicIdRequest { int32 clinic_id = 1; }
message ServiceIdRequest { int32 service_id = 1; }

message FeedbackItem {
  int32 id = 1;
  string patient_name = 2;
  string patient_avatar = 3;
  int32 rating_doctor = 4;
  int32 rating_clinic = 5;
  int32 rating_service = 6;
  int32 rating_booking = 7;
  string comment = 8;
  string created_at = 9;
  string doctor_name = 10;
}

message FeedbackListResponse {
  bool success = 1;
  repeated FeedbackItem data = 2;
  double avg_rating = 3;
}