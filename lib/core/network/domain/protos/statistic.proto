syntax = "proto3";

package statistic;

service StatisticService {
  rpc GetAdminDashboard (DashboardRequest) returns (AdminDashboardResponse);
}

message DashboardRequest {
  string from_date = 1; 
  string to_date = 2;   
}

message AdminDashboardResponse {
  bool success = 1;
  int32 total_doctors = 2;
  int32 total_patients = 3;
  int32 total_bookings = 4;
  double total_revenue = 5;
  
  BookingStatusStats booking_status_breakdown = 6;
  repeated SpecialtyDistribution specialty_stats = 7;
  repeated ChartData revenue_by_month = 8;
  repeated TopDoctor top_doctors = 9;
  PatientDemographics demographics = 10;
}

// Các message con giữ nguyên như bản trước để vẽ biểu đồ
message BookingStatusStats { int32 pending = 1; int32 confirmed = 2; int32 finished = 3; int32 cancelled = 4; }
message SpecialtyDistribution { string specialty_name = 1; int32 doctor_count = 2; int32 booking_count = 3; double revenue = 4; }
message PatientDemographics { int32 male_count = 1; int32 female_count = 2; int32 other_count = 3; }
message TopDoctor { int32 id = 1; string name = 2; int32 total_done = 3; double revenue = 4; double rating = 5; }
message ChartData { string label = 1; double value = 2; }