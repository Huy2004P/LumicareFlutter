name: lumi_care
description: "LumiCare - Health Booking System (Standalone)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  get_it: ^7.6.7
  equatable: ^2.0.5
  grpc: 4.1.0
  protobuf: ^3.1.0
  shared_preferences: ^2.2.2
  go_router: ^13.2.0
  intl: ^0.19.0
  dartz: ^0.10.1
  onesignal_flutter: ^5.1.0
  dio: ^5.4.1
  http: ^1.2.0
  socket_io_client: ^3.0.0
  rxdart: ^0.27.7
  bloc: ^8.1.4
  path: ^1.9.0
  flutter_rating_bar: ^4.0.1
  flutter_markdown: ^0.6.18+3
  flutter_widget_from_html: ^0.10.5
  image_picker: ^1.0.7
  jwt_decoder: ^2.0.1
  flutter_native_splash: ^2.4.6
  remixicon: ^1.4.1
  flutter_launcher_icons: ^0.13.1
  url_launcher: ^6.3.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png" 
  min_sdk_android: 21 
  adaptive_icon_background: "#ffffff" 
  adaptive_icon_foreground: "assets/logo.png" 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  protoc_plugin: ^21.1.2

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png